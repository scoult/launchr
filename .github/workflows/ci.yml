name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    # macOS is required: the Tauri crate is macOS-only, and `cargo` needs the
    # frontend dist/ (built first below) to compile.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build frontend
        run: pnpm build

      - name: Frontend unit tests
        run: |
          node src/lib/ansi.test.ts
          node src/lib/shellwords.test.ts

      - name: Rust toolchain components
        run: rustup component add rustfmt clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Validate specs
        run: |
          brew install openspec
          openspec validate --specs
