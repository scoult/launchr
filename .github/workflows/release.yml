name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Builds the app (runs beforeBuildCommand: pnpm build), bundles the .dmg,
      # and creates a draft GitHub Release with the assets attached.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "launchr ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            ## Install (unsigned build)

            Download the `.dmg` below, open it, and drag launchr to Applications.

            This build is **not code-signed**, so on first launch macOS shows
            _"launchr.app is damaged and can't be opened"_ — this is expected for
            an unsigned download, the app is fine. Clear the quarantine to open it:

            ```
            xattr -dr com.apple.quarantine /Applications/launchr.app
            ```

            (Right-click → Open does **not** clear the "damaged" state on Apple
            Silicon.)

            Apple Silicon (arm64) only.
